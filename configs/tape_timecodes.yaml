# tape_timecodes.yaml — Ground truth de cintas naranjas (usuario, 2026-06-10).
#
# El usuario reportó el INSTANTE (segundos de video, aproximado) en que la
# cámara pasa por el MEDIO de cada cinta naranja. Las cintas están instaladas
# cada 1 m sobre la malla → posición de la cinta N = (N-1) metros desde la
# cinta 1. Todos los videos parten desde la cinta 1 (video_3 parte un poco
# antes: cruza la cinta 1 en t=2 s).
#
# Precisión: timecodes "aproximados" (±0.5 s estimado, lectura visual del
# usuario). La posición es 1-D a lo largo de la malla (recorrido recto);
# para GT TUM se interpola linealmente entre cruces consecutivos.
#
# Conversión a frame-index (timestamps de trajectory.txt): frame = t_s × fps.
# OJO con el skip de cada run (frame absoluto del SVO = el que se reporta acá).
#
# Finding: docs/findings/2026-06-10-gt-tape-timecodes-user.md

gym_video_1:
  file: data/recordings/gym_air/video_1.svo2
  fps: 30
  frames_total: 818
  direction: lateral left, one-way (no loop)
  camera_to_mesh_m: 2.0          # distancia aproximada cámara-malla
  gt_total_m: [10.0, 11.0]       # camina "un poco más" tras la cinta 10
  run_skip_frames: 15            # runs DPVO 2026-06-09 (0.5 s)
  tapes:                          # {cinta: t_segundos} · pos_m = cinta - 1
    1: 0
    2: 4
    3: 7
    4: 10
    5: 12
    6: 15
    7: 18
    8: 21
    9: 23
    10: 25

