### DPVO Config — edges sweep P=24 OW=3 LT=6 (base x86_smoke, 2026-06-12)
# Memoria reducida vs default.yaml para validar pipeline E2E en 12 GB.
# Para runs reales subir PATCHES_PER_FRAME a 96 (default.yaml) o 48 (fast.yaml).

PATCHES_PER_FRAME: 24
REMOVAL_WINDOW: 10
OPTIMIZATION_WINDOW: 3
PATCH_LIFETIME: 6

KEYFRAME_THRESH: 15.0

MOTION_MODEL: 'DAMPED_LINEAR'
MOTION_DAMPING: 0.5

MIXED_PRECISION: True
GRADIENT_BIAS: False
